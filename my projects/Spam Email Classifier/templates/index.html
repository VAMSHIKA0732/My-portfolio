<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spam Email Classifier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: #1e293b;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
    }

    .icon-float {
      position: absolute;
      top: -40px;
      right: -40px;
      background: #3b82f6;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: white;
      animation: float 6s ease-in-out infinite alternate;
      box-shadow: 0 0 20px #3b82f6aa;
    }

    @keyframes float {
      0% {
        transform: translateY(0px) rotate(0deg);
      }
      100% {
        transform: translateY(10px) rotate(10deg);
      }
    }

    h2 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 20px;
      color: #f1f5f9;
    }

    textarea {
      width: 100%;
      height: 160px;
      background-color: #0f172a;
      border: 2px solid #334155;
      color: #e2e8f0;
      border-radius: 12px;
      padding: 15px;
      font-size: 1rem;
      margin-bottom: 25px;
      outline: none;
      transition: 0.3s ease;
    }

    textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 10px #3b82f655;
    }

    textarea::placeholder {
      color: #94a3b8;
    }

    button {
      width: 100%;
      background: linear-gradient(to right, #06b6d4, #3b82f6);
      border: none;
      color: white;
      padding: 15px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3);
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
    }

    .result {
      margin-top: 25px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      background: linear-gradient(to right, #facc15, #fef08a);
      color: #1e293b;
      font-weight: bold;
      font-size: 1.2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7);
      }
      70% {
        transform: scale(1.02);
        box-shadow: 0 0 20px 10px rgba(250, 204, 21, 0.3);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7);
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }
      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-float">🧠</div>
    <h2>Spam Email Classifier</h2>
    <form method="POST" action="/predict">
      <textarea name="message" placeholder="Paste your email content here..." required></textarea>
      <button type="submit">Submit</button>
    </form>
    {% if prediction %}
      <div class="result">Prediction: {{ prediction }}</div>
    {% endif %}
  </div>
</body>
</html>
