<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fake News Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>📰 Fake News Detector</h1>
    <p class="subtext">Paste the news/article below and click to verify if it’s real or fake.</p>

    <textarea id="newsText" placeholder="Enter news content here..."></textarea>
    <button onclick="checkNews()">Check Authenticity</button>
    <div id="result" class="result-box"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
